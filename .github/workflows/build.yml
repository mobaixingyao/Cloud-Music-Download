name: Build Cloud Music Download

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install customtkinter requests pillow pyinstaller
      
      - name: Verify icon files exist
        run: |
          if (Test-Path "icon.ico") { Write-Host "icon.ico found" } else { Write-Host "Warning: icon.ico not found" }
          if (Test-Path "icon.png") { Write-Host "icon.png found" } else { Write-Host "Warning: icon.png not found" }
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --name "CloudMusicDownload" `
            --icon="icon.ico" `
            --add-data "icon.ico;." `
            --add-data "icon.png;." `
            --add-data "icon.ico;." `
            --add-binary "icon.ico;." `
            "Cloud Music Download.py"
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-Windows
          path: dist/CloudMusicDownload.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install customtkinter requests pillow pyinstaller
      
      - name: Verify icon files exist
        run: |
          if [ -f "icon.icns" ]; then echo "icon.icns found"; else echo "Warning: icon.icns not found"; fi
          if [ -f "icon.png" ]; then echo "icon.png found"; else echo "Warning: icon.png not found"; fi
          if [ -f "icon.ico" ]; then echo "icon.ico found"; else echo "Warning: icon.ico not found"; fi
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "CloudMusicDownload" \
            --icon="icon.icns" \
            --add-data "icon.icns:." \
            --add-data "icon.png:." \
            "Cloud Music Download.py"
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-macOS
          path: dist/CloudMusicDownload
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libxkbcommon-x11-0
      
      - name: Install Python dependencies
        run: |
          pip install customtkinter requests pillow pyinstaller
      
      - name: Verify icon files exist
        run: |
          if [ -f "icon.ico" ]; then echo "icon.ico found"; else echo "Warning: icon.ico not found"; fi
          if [ -f "icon.png" ]; then echo "icon.png found"; else echo "Warning: icon.png not found"; fi
          if [ -f "icon.icns" ]; then echo "icon.icns found"; else echo "Warning: icon.icns not found"; fi
      
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "CloudMusicDownload" \
            --icon="icon.ico" \
            --add-data "icon.png:." \
            --add-data "icon.ico:." \
            "Cloud Music Download.py"
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-Linux
          path: dist/CloudMusicDownload
          if-no-files-found: error