name: Build Cloud Music Download

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Windows - 直接生成 exe
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --name "CloudMusicDownload" `
            --icon="icon.ico" `
            --add-data "icon.ico;." `
            --add-data "icon.png;." `
            --hidden-import "PIL._tkinter_finder" `
            "Cloud Music Download.py"
      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-Windows
          path: dist/CloudMusicDownload.exe

  # macOS - 生成 DMG
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build .app bundle
        run: |
          pyinstaller --windowed \
            --name "CloudMusicDownload" \
            --icon="icon.icns" \
            --add-data "icon.icns:." \
            --add-data "icon.png:." \
            --add-data "icon.ico:." \
            --hidden-import "PIL._tkinter_finder" \
            "Cloud Music Download.py"
      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -r "dist/CloudMusicDownload.app" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "CloudMusicDownload" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            CloudMusicDownload.dmg
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-macOS
          path: CloudMusicDownload.dmg

  # Linux - 生成可执行文件（用户自行添加执行权限）
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libxkbcommon-x11-0
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "CloudMusicDownload" \
            --add-data "icon.png:." \
            --add-data "icon.ico:." \
            --hidden-import "PIL._tkinter_finder" \
            "Cloud Music Download.py"
      - name: Make executable
        run: chmod +x dist/CloudMusicDownload
      - name: Upload Linux executable
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-Linux
          path: dist/CloudMusicDownload