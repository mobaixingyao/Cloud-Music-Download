name: Build Cloud Music Download

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build with PyInstaller using spec
        run: pyinstaller "Cloud Music Download.spec"
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-Windows
          path: dist/cloudmusicdownload.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build with PyInstaller using spec
        run: pyinstaller "Cloud Music Download.spec"
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-macOS
          path: dist/cloudmusicdownload

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libxkbcommon-x11-0
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Build with PyInstaller using spec
        run: pyinstaller "Cloud Music Download.spec"
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudMusicDownload-Linux
          path: dist/cloudmusicdownload
